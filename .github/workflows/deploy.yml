name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # astro.config.mjs apunta al dominio definitivo (eraldia.com, base /).
      # GitHub Pages sirve el repo (renombrado a eraldia-web) en una subcarpeta:
      # https://sailwave-ai.github.io/eraldia-web/ — por eso el override.
      # Cuando eraldia.com esté activo en Cloudflare Pages, elimina este env
      # (o el workflow entero si dejas de usar GitHub Pages).
      - name: Build site
        env:
          ASTRO_SITE: "https://sailwave-ai.github.io"
          ASTRO_BASE: "/eraldia-web"
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
